services:
  # 1. Machine Learning API (FastAPI)
  - type: web
    name: cancer-ai-api
    env: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true

  # 2. Premium Frontend Site (Vite Static)
  - type: static_site
    name: cancer-ai-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        fromService:
          name: cancer-ai-api
          type: web
          property: host