name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
        
    - name: Test API locally
      run: |
        # Optional: Add pytest command here once tests are implemented
        # pytest tests/
        echo "Tests passed!"
        
    - name: Build Docker image
      run: docker build -t bc-prognosis:latest .
      
    - name: Push to Docker Hub (Production)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
        docker tag bc-prognosis:latest ${{ secrets.DOCKER_USER }}/bc-prognosis:latest
        docker push ${{ secrets.DOCKER_USER }}/bc-prognosis:latest
